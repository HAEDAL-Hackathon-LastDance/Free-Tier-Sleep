name: Title Convention Check

on:
  issues:
    types: [opened, edited, reopened]
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: write

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 제목 검사 및 경고 댓글 작성
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request?.title || context.payload.issue?.title;
            const type = context.payload.pull_request ? 'PR' : '이슈';
            
            const regex = /^(feat|docs|fix|bug|chore|question)\s*:\s*.+$/;
            
            if (!regex.test(title)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  `❌ **${type} 제목 형식이 올바르지 않습니다.**`,
                  '',
                  `현재 제목: \`${title}\``,
                  '',
                  `아래 컨벤션에 맞게 수정해 주세요. (콜론 앞뒤 띄어쓰기 주의)`,
                  '- `feat : 기능 추가`',
                  '- `bug : 버그 수정`',
                  '- `chore : 패키지 및 에셋 추가`'
                ].join('\n')
              });
              core.setFailed(`❌ ${type} 제목 규칙 위반`);
            } else {
              console.log(`✅ 올바른 ${type} 제목 형식입니다.`);
            }